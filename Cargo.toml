[package]
name = "zenapi"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0.102"
axum = "0.8.9"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
serde_yaml = "0.9"
slint = { version = "1.16.1", features = ["unstable-fontique-08"] }
tokio = { version = "1.52.3", features = ["macros", "net", "rt-multi-thread", "sync", "time"] }

[build-dependencies]
slint-build = "1.16.1"

[dev-dependencies]
temp-dir = "0.1.16"
